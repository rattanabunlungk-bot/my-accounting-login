<!DOCTYPE html>
     <html lang="th">
     <head>
         <meta charset="UTF-8">
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <title>Login - Accounting Office</title>
         <link rel="stylesheet" href="style.css">
     </head>
     <body class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h2>สำนักงานบัญชี</h2>
                    <p>กรุณาเข้าสู่ระบบเพื่อใช้งาน</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>ชื่อผู้ใช้งาน (Username)</label>
                        <input type="text" id="username" placeholder="เช่น owner, manager1, staff1" required>
                    </div>
                    <div class="form-group">
                        <label>รหัสผ่าน (Password)</label>
                        <input type="password" id="password" value="1234" required>
                    </div>
                    <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
                </form>
                <div class="login-hint">
                    <small>*รหัสผ่านเริ่มต้นคือ 1234 สำหรับทุก User</small>
                </div>
            </div>
        </div>
        <script src="app.js"></script>
    </body>
    </html>
